<!DOCTYPE html>
<html>
<head>
    <title>SIMATS ENGINEERING Admin Login</title>
    <style>
        body {
            font-family: Arial;
            background-color: #f2f2f2;
            text-align: center;
            padding-top: 100px;
        }

        .login-box {
            background: white;
            width: 300px;
            margin: auto;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        input {
            width: 90%;
            padding: 8px;
            margin: 8px;
        }

        button {
            padding: 8px 20px;
            background: green;
            color: white;
            border: none;
            border-radius: 5px;
        }

        button:hover {
            background: darkgreen;
        }

        .college-logo-small {
            max-width: 80px;
            display: block;
            margin: 0 auto 10px;
        }
    </style>
</head>
<body>

<div class="login-box">
    <img src="/images/simats-logo.png" alt="SIMATS Logo" class="college-logo-small">
    <h2>Admin Login</h2>

    <form method="post" action="/login">
        <input type="text" name="username" placeholder="Enter Username" required><br>
        <input type="password" name="password" placeholder="Enter Password" required><br>
        <button type="submit">Login</button>
    </form>
</div>

</body>
</html>
