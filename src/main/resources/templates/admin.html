<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Admin Panel</title>
    <style>
        body { font-family: Arial; background: #f2f2f2; padding: 40px; }
        .box { background: white; padding: 20px; border-radius: 10px; width: 800px; margin: auto; }
        input { margin: 5px; padding: 5px; }
        button { padding: 5px 10px; background: green; color: white; border: none; }
        table { width: 100%; margin-top: 20px; border-collapse: collapse; }
        table, th, td { border: 1px solid gray; padding: 8px; text-align: center; }
    </style>
</head>
<body>

<div class="box">
    <h2>Admin Panel</h2>

    <h3>Add Course</h3>
    <form method="post" action="/addCourse">
        <input type="text" name="department" placeholder="Department" required>
        <input type="text" name="courseName" placeholder="Course Name" required>
        <input type="text" name="duration" placeholder="Duration" required>
        <input type="text" name="fees" placeholder="Fees" required>
        <button type="submit">Add</button>
    </form>

    <h3>All Courses</h3>
    <table>
        <tr>
            <th>ID</th>
            <th>Department</th>
            <th>Course</th>
            <th>Duration</th>
            <th>Fees</th>
        </tr>

        <tr th:each="c : ${courses}">
            <td th:text="${c.id}"></td>
            <td th:text="${c.department}"></td>
            <td th:text="${c.courseName}"></td>
            <td th:text="${c.duration}"></td>
            <td th:text="${c.fees}"></td>
        </tr>
    </table>

</div>

</body>
</html>
